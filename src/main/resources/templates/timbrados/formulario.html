<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registros de Timbrados</title>
    <link rel="stylesheet" th:href="@{/css/estilosForm.css}">
    
    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <h1>Registros de Timbrados</h1>

    <!-- Mensajes de Feedback -->
    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <!-- FORMULARIO-->
    <div class="card" th:if="${mostrarFormulario}">
        <h2 th:text="${timbrado.idTimbrado != 0} ? 'Editar Timbrado' : 'Nueva Timbrado'">
            Nuevo Timbrado
        </h2>

        <form th:action="@{/timbrados/guardar}" th:object="${timbrado}" method="post">

            <!-- ID oculto para edición -->
            <input type="hidden" th:field="*{idTimbrado}" />

            <div class="grid">

                <!-- ── donde se llena los Datos  ── -->
                <div class="section-label">Datos del timbrado</div>

                <div class="field">
                    <label for="numeroTimbrado">N° Timbrado</label>
                    <input type="text" id="numeroTimbrado" th:field="*{numeroTimbrado}" maxlength="60" required />
                </div>
                <div class="field">
                    <label for="proveedor">Proveedor</label>
                    <select id="proveedor" th:field="*{proveedor}" required class="select2">
                        <option value="">Seleccione un proveedor</option>
                        <option th:each="p : ${proveedores}" th:value="${p.idProveedor}" th:text="${p.razonSocial}"></option>
                    </select>
                </div>
				<div class="field">
				    <label for="inicioVigencia">Inicio de Vigencia</label>
				    <input type="date" id="inicioVigencia" th:field="*{inicioVigencia}" required />
				</div>

                <div class="field">
                    <label for="inicioDoc">N° inicio de documento</label>
                    <input type="text" id="inicioDoc" th:field="*{inicioDoc}" maxlength="100" required />
                </div>
                <div class="field">
                    <label for="estado">Estado</label>
                    <select id="estado" th:field="*{estado}" required class="select2">
                        <option value="true">Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>
				<div class="field">
					<label for="finVigencia">Fin de vigencia</label>
					<input type="date" id="finVigencia" th:field="*{finVigencia}" required />
				</div>
				<div class="field">
				    <label for="finalDoc">N° final de documento</label>
				    <input type="text" id="finalDoc" th:field="*{finalDoc}" maxlength="100" required />
				</div>
            </div><!-- /grid -->

            <div class="botones">
                <button type="submit" class="btn-guardar">💾 Guardar</button>
                <a href="/timbrados" class="btn btn-cancelar">✖ Cancelar</a>
            </div>

        </form>
    </div>
    <!-- Lista de los que se han registrado en la DB -->
    <div class="card" th:if="${!mostrarFormulario}">
        <h2>Listado de Timbrados</h2>

        <!-- Buscador -->
        <form th:action="@{/timbrados}" method="get" class="buscador">
            <input type="text" name="filtro" placeholder="Buscar..." />
            <button type="submit" class="btn-buscar">🔍 Buscar</button>
            <a href="/timbrados/nuevo" class="btn btn-nuevo">➕ Nuevo</a>
        </form>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>N° Timbrado</th>
                    <th>Proveedor</th>
                    <th>Vigencia</th>
                    <th>N° inicial del documento </th>
                    <th>Estado</th>
                    <th>N° final del documento </th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(timbrados)}">
                    <td colspan="8" class="sin-datos">No hay timbrados registrados.</td>
                </tr>
                <tr th:each="tim : ${timbrados}">
                    <td th:text="${tim.idTimbrado}"></td>
                    <td th:text="${tim.numeroTimbrado}"></td>
                    <td th:text="${tim.proveedor != null ? tim.proveedor.razonSocial : 'N/A'}"></td>
                    <td th:text="${#temporals.format(tim.inicioVigencia, 'dd/MM/yyyy') + ' al ' + #temporals.format(tim.finVigencia, 'dd/MM/yyyy')}"></td>
                    <td th:text="${tim.inicioDoc}"></td>
                    <td th:text="${tim.estado ? 'Activo' : 'Inactivo'}"></td>
                    <td th:text="${tim.finalDoc}"></td>
                    <td class="acciones">
                        <a th:href="@{/timbrados/editar/{id}(id=${tim.idTimbrado})}" class="btn-editar">✍🏻Editar</a>
                        <a th:href="@{/timbrados/eliminar/{id}(id=${tim.idTimbrado})}" class="btn-eliminar"
                            onclick="return confirm('¿Confirma eliminar este Registro?')">🚮Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

    <script>
        $(document).ready(function() {
            $('.select2').select2({
                width: '100%'
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Compra</title>
    <link rel="stylesheet" th:href="@{/css/estilosForm.css}">
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h4><i class="fas fa-shopping-cart"></i> Nueva Compra a Proveedor</h4>
        </div>
        <div class="card-body">

            <!-- Mensajes -->
            <div th:if="${mensaje}" class="alert alert-success alert-dismissible">
                <span th:text="${mensaje}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/compras/guardar}" th:object="${compraDTO}" method="post" id="formCompra">

                <!-- Proveedor -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Proveedor:</label>
                        <select th:field="*{proveedorId}" class="form-select" required>
                            <option value="">-- Seleccione un proveedor --</option>
                            <option th:each="prov : ${proveedores}" 
                                    th:value="${prov.idProveedor}" 
                                    th:text="${prov.razonSocial + ' (' + prov.persona.nombre + ')'}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Fecha:</label>
                        <input type="date" class="form-control" th:value="${#dates.format(#calendars.createToday(), 'yyyy-MM-dd')}" readonly/>
                    </div>
                </div>

                <hr>

                <!-- Tabla de Detalles -->
                <h5 class="mb-3">Detalles de Productos</h5>
                <table class="table table-bordered" id="tablaDetalles">
                    <thead class="table-light">
                        <tr>
                            <th width="40%">Producto</th>
                            <th width="15%">Cantidad</th>
                            <th width="20%">Precio Unitario</th>
                            <th width="15%">Subtotal</th>
                            <th width="10%">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="bodyDetalles">
                        <!-- Filas se agregan con JavaScript -->
                    </tbody>
                </table>

                <button type="button" class="btn btn-success mb-3" onclick="agregarFila()">
                    <i class="fas fa-plus"></i> Agregar Producto
                </button>

                <!-- Total -->
                <div class="row">
                    <div class="col-md-6 offset-md-6">
                        <div class="input-group">
                            <span class="input-group-text fw-bold">Total Compra</span>
                            <input type="text" id="totalGeneral" class="form-control text-end fw-bold" readonly value="0.00"/>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-save"></i> Registrar Compra
                    </button>
                    <a th:href="@{/compras}" class="btn btn-secondary btn-lg">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let filaIndex = 0;

    function agregarFila() {
        const tbody = document.getElementById('bodyDetalles');

        const fila = document.createElement('tr');
        fila.id = `fila-${filaIndex}`;

        fila.innerHTML = `
            <td>
                <select class="form-select" name="detalles[${filaIndex}].productoId" onchange="calcularSubtotal(${filaIndex})" required>
                    <option value="">Seleccione producto...</option>
                    <option th:each="prod : ${productos}" th:value="${prod.idProducto}" th:text="${prod.descripcion}"></option>
                </select>
            </td>
            <td>
                <input type="number" class="form-control text-center" 
                       name="detalles[${filaIndex}].cantidad" 
                       step="0.01" min="0.01" value="1" 
                       onchange="calcularSubtotal(${filaIndex})" required>
            </td>
            <td>
                <input type="number" class="form-control text-end" 
                       name="detalles[${filaIndex}].precioUnitario" 
                       step="0.01" min="0" value="0"
                       onchange="calcularSubtotal(${filaIndex})" required>
            </td>
            <td>
                <input type="text" class="form-control text-end fw-bold" id="subtotal-${filaIndex}" readonly value="0.00">
            </td>
            <td class="text-center">
                <button type="button" class="btn btn-danger btn-sm" onclick="eliminarFila(${filaIndex})">
                    <i class="fas fa-trash"></i>
                </button>
            </td>
        `;

        tbody.appendChild(fila);
        filaIndex++;
    }

    function eliminarFila(index) {
        const fila = document.getElementById(`fila-${index}`);
        if (fila) fila.remove();
        calcularTotalGeneral();
    }

    function calcularSubtotal(index) {
        const cantidad = parseFloat(document.querySelector(`[name="detalles[${index}].cantidad"]`).value) || 0;
        const precio = parseFloat(document.querySelector(`[name="detalles[${index}].precioUnitario"]`).value) || 0;
        const subtotal = cantidad * precio;

        document.getElementById(`subtotal-${index}`).value = subtotal.toFixed(2);
        calcularTotalGeneral();
    }

    function calcularTotalGeneral() {
        let total = 0;
        document.querySelectorAll('input[id^="subtotal-"]').forEach(input => {
            total += parseFloat(input.value) || 0;
        });
        document.getElementById('totalGeneral').value = total.toFixed(2);
    }

    // Agregar una fila por defecto al cargar
    window.onload = function() {
        agregarFila();
    };
</script>
</body>
</html>
